services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: TrentBicycleShopDB
      MYSQL_ROOT_PASSWORD: YOUR_DB_PASSWORD
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "ManguMani456;."]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/TrentBicycleShopDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: YOUR_DB_PASSWORD

volumes:
  mysql_data:
